spring:
  application:
    name: singularitywalk

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/singularitywalk?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true

  sql:
    init:
      mode: always
      encoding: UTF-8

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: ${JWT_SECRET:singularitywalk-secret-key-2024-change-in-production}
  expiration: 86400000

file:
  upload-dir: /var/www/singularitywalk/uploads
  embedded-projects-dir: /var/www/singularitywalk/embedded-projects

model:
  path: /var/www/singularitywalk/models/emotion_model.onnx

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB
