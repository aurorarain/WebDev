spring:
  application:
    name: singularitywalk

  # 开发环境：H2 内存数据库
  datasource:
    url: jdbc:h2:mem:singularitywalk
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    defer-datasource-initialization: true

  # H2 控制台
  h2:
    console:
      enabled: true
      path: /h2-console

  # 启动时执行种子数据（在 Hibernate 建表之后）
  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

model:
  path: classpath:models/emotion_model.onnx

jwt:
  secret: singularitywalk-secret-key-2024-change-in-production
  expiration: 86400000

file:
  upload-dir: ./uploads
